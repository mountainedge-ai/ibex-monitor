<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MountAIn Web Monitor - IBEX</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .page-header .logo { height: 48px; width: auto; display: block; }
        .page-header .logo-divider { width: 1px; height: 32px; background: #333; flex-shrink: 0; }
        .page-header h2 { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        #stream { border: 2px solid #333; background: #000; display: block; width: 640px; height: 640px; image-rendering: pixelated; object-fit: contain; object-position: top center; }
        .stream-column { width: 640px; flex-shrink: 0; }
        .viewer-layout { display: inline-block; text-align: left; }
        #toggleBtn {
            width: 100%;
            min-width: 0;
            margin-bottom: 15px;
            box-sizing: border-box;
            display: block;
        }
        button { border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; min-width: 160px; transition: 0.3s; }
        .btn-start { background: #00e676; color: #000; }
        .btn-stop { background: #ff5252; color: white; }
        .fps-stat {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            background: #000;
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .label { color: #888; }
        .value { color: #00e676; font-weight: 700; }
        .value-num {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
            display: inline-block;
            text-align: right;
        }
        #fps.value-num { min-width: 4ch; }
        #perf { margin-top:10px; font-size: 11px; color: #666; font-family: monospace; text-align: left; width: 100%; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; line-height: 1.4; }
        #perf.status-error { color: #ffd0d0; background: rgba(255, 82, 82, 0.12); border: 1px solid rgba(255, 82, 82, 0.35); padding: 10px 12px; border-radius: 8px; font-weight: 700; }
        .viewer-row { display: flex; gap: 32px; align-items: stretch; justify-content: center; flex-wrap: wrap; }
        .side-column { display: flex; flex-direction: column; width: 220px; flex-shrink: 0; height: 640px; gap: 20px; }
        .chart-panel { text-align: left; flex: 1; min-height: 0; display: flex; flex-direction: column; }
        .chart-panel h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
        #detectionChart { width: 220px; flex: 1; min-height: 0; border: 2px solid #333; border-radius: 6px; background: #000; display: block; }
        .chart-minutes { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; font-size: 12px; flex-shrink: 0; }
        .chart-minutes input[type="number"] {
            width: 64px;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            text-align: right;
        }
        .chart-minutes input[type="number"]:focus { outline: none; border-color: #00e676; }
        .wb-panel { display: block; text-align: left; flex-shrink: 0; }
        .wb-panel.disabled {
            opacity: 0.45;
            filter: grayscale(0.65);
            pointer-events: none;
        }
        .wb-panel.disabled .wb-readout span { color: #666; }
        .wb-panel h3 { margin: 0; font-size: 14px; font-weight: 600; }
        .wb-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .wb-awb-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .wb-awb-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: #00e676;
            cursor: pointer;
        }
        .wb-readout { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; color: #888; margin-bottom: 8px; }
        .wb-readout span { color: #00e676; font-weight: 700; }
        .wb-picker-wrap { position: relative; width: 220px; height: 220px; }
        #wbPicker { width: 220px; height: 220px; border: 2px solid #333; border-radius: 6px; cursor: crosshair; display: block; touch-action: none; }
        .wb-axis { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-top: 4px; }
        .wb-axis-y { position: absolute; left: -18px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-between; font-size: 11px; color: #666; }
        .wb-axis-y-title {align-self: center; position: relative; left: -8px; transform: rotate(-90deg); font-size: 11px; color: #666; white-space: nowrap; line-height: 1; pointer-events: none; }
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            min-width: 360px;
            text-align: left;
        }
        .modal h3 { margin: 0 0 16px; }
        .modal select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 16px;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-actions button { min-width: 100px; }
        .btn-cancel { background: #444; color: #fff; }
    </style>
</head>
<body>

    <div class="page-header">
        <img src="/resources/templates/mountain.png" alt="MountAIn" class="logo">
        <span class="logo-divider" aria-hidden="true"></span>
        <h2>IBEX Stream</h2>
        <span class="logo-divider" aria-hidden="true"></span>
        <img src="/resources/templates/alif-logo.svg" alt="Alif Semiconductor" class="logo">
    </div>

    <div class="card">
        <div class="viewer-layout">
            <button id="toggleBtn" class="btn-start">START STREAM</button>
            <div class="viewer-row">
                <div class="stream-column">
                    <img id="stream" alt="Waiting for stream" width="640" height="640">
                </div>
                <div class="side-column">
                <div class="fps-stat">
                    <span class="label">FPS:</span><span id="fps" class="value value-num">0</span>
                </div>
                <div class="chart-panel">
                    <h3>Detections</h3>
                    <canvas id="detectionChart" width="220" height="220"></canvas>
                    <label class="chart-minutes">
                        <span class="label">Window (min)</span>
                        <input type="number" id="chartMinutes" min="1" max="30" value="1" step="1">
                    </label>
                </div>
                <div id="wbPanel" class="wb-panel disabled">
                    <div class="wb-panel-header">
                        <h3>White Balance</h3>
                        <label class="wb-awb-toggle">
                            <input type="checkbox" id="wbAwbCheckbox" checked>
                            <span>AWB</span>
                        </label>
                    </div>
                    <div class="wb-readout">R <span id="wbR">1.70</span> &nbsp; G 1.00 &nbsp; B <span id="wbB">1.55</span></div>
                    <div class="wb-picker-wrap">
                        <div class="wb-axis-y">
                            <span>2.5</span><span class="wb-axis-y-title">R gain</span><span>0.5</span>
                        </div>
                        <canvas id="wbPicker" width="220" height="220"></canvas>
                    </div>
                    <div class="wb-axis"><span>0.5</span><span>B gain</span><span>2.5</span></div>
                    <!-- <div class="wb-axis" style="justify-content:center;margin-top:2px;"><span>R gain ↑</span></div> -->
                </div>
                </div>
            </div>
        </div>

        <div id="perf">Status: Disconnected</div>
    </div>

    <div id="portModal" class="modal-backdrop">
        <div class="modal">
            <h3>Select serial port</h3>
            <select id="portSelect"></select>
            <div class="modal-actions">
                <button type="button" id="cancelPortBtn" class="btn-cancel">Cancel</button>
                <button type="button" id="confirmPortBtn" class="btn-start">Connect</button>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const streamImg = document.getElementById('stream');
        const fpsTxt = document.getElementById('fps');
        const perfTxt = document.getElementById('perf');
        const portModal = document.getElementById('portModal');
        const portSelect = document.getElementById('portSelect');
        const confirmPortBtn = document.getElementById('confirmPortBtn');
        const cancelPortBtn = document.getElementById('cancelPortBtn');
        const wbPanel = document.getElementById('wbPanel');
        const wbPicker = document.getElementById('wbPicker');
        const wbPickerCtx = wbPicker.getContext('2d');
        const wbRTxt = document.getElementById('wbR');
        const wbBTxt = document.getElementById('wbB');
        const wbAwbCheckbox = document.getElementById('wbAwbCheckbox');
        const detectionChart = document.getElementById('detectionChart');
        const detectionChartCtx = detectionChart.getContext('2d');
        const chartMinutesInput = document.getElementById('chartMinutes');

        const CHART_MINUTES_DEFAULT = 1;
        const CHART_PAD = { left: 28, right: 8, top: 8, bottom: 22 };
        let chartMinutesDebounce = null;
        let lastChartSeries = [];
        let lastChartWindowSec = CHART_MINUTES_DEFAULT * 60;

        function syncDetectionChartSize() {
            const h = Math.max(1, detectionChart.clientHeight);
            const w = Math.max(1, detectionChart.clientWidth);
            if (detectionChart.width !== w || detectionChart.height !== h) {
                detectionChart.width = w;
                detectionChart.height = h;
            }
        }

        function clampChartMinutes() {
            let v = parseInt(chartMinutesInput.value, 10);
            if (Number.isNaN(v)) v = CHART_MINUTES_DEFAULT;
            v = Math.max(1, Math.min(30, v));
            chartMinutesInput.value = String(v);
            return v;
        }

        function drawDetectionChart(series, windowSec) {
            lastChartSeries = series;
            lastChartWindowSec = windowSec;
            syncDetectionChartSize();
            const w = detectionChart.width;
            const h = detectionChart.height;
            const plotW = w - CHART_PAD.left - CHART_PAD.right;
            const plotH = h - CHART_PAD.top - CHART_PAD.bottom;

            detectionChartCtx.fillStyle = '#000';
            detectionChartCtx.fillRect(0, 0, w, h);

            let maxCount = 0;
            for (const s of series) {
                for (const [, count] of s.points) {
                    const n = Number(count);
                    if (n > maxCount) maxCount = n;
                }
            }
            const yMax = Math.max(1, Math.ceil(maxCount));

            detectionChartCtx.strokeStyle = '#333';
            detectionChartCtx.lineWidth = 1;
            for (let i = 0; i <= yMax; i++) {
                const y = CHART_PAD.top + plotH - (i / yMax) * plotH;
                detectionChartCtx.beginPath();
                detectionChartCtx.moveTo(CHART_PAD.left, y);
                detectionChartCtx.lineTo(w - CHART_PAD.right, y);
                detectionChartCtx.stroke();
            }

            const xTickSec = windowSec <= 120 ? 30 : 60;
            for (let t = 0; t <= windowSec; t += xTickSec) {
                const x = CHART_PAD.left + (t / windowSec) * plotW;
                detectionChartCtx.beginPath();
                detectionChartCtx.moveTo(x, CHART_PAD.top);
                detectionChartCtx.lineTo(x, h - CHART_PAD.bottom);
                detectionChartCtx.stroke();
            }

            detectionChartCtx.fillStyle = '#666';
            detectionChartCtx.font = '11px ui-monospace, Menlo, Monaco, Consolas, monospace';
            detectionChartCtx.textAlign = 'right';
            detectionChartCtx.textBaseline = 'middle';
            for (let i = 0; i <= yMax; i++) {
                const y = CHART_PAD.top + plotH - (i / yMax) * plotH;
                detectionChartCtx.fillText(String(i), CHART_PAD.left - 4, y);
            }

            detectionChartCtx.textAlign = 'center';
            detectionChartCtx.textBaseline = 'top';
            for (let t = 0; t <= windowSec; t += xTickSec) {
                const x = CHART_PAD.left + (t / windowSec) * plotW;
                const label = t >= 60 ? `${Math.round(t / 60)}m` : `${t}s`;
                detectionChartCtx.fillText(label, x, h - CHART_PAD.bottom + 4);
            }

            if (!series.length) {
                detectionChartCtx.fillStyle = '#666';
                detectionChartCtx.textAlign = 'center';
                detectionChartCtx.textBaseline = 'middle';
                detectionChartCtx.fillText('No detections', w / 2, h / 2);
                return;
            }

            for (const s of series) {
                if (!s.points.length) continue;
                detectionChartCtx.strokeStyle = s.color;
                detectionChartCtx.lineWidth = 1.5;
                detectionChartCtx.beginPath();
                let started = false;
                for (const [t, count] of s.points) {
                    const x = CHART_PAD.left + (t / windowSec) * plotW;
                    const y = CHART_PAD.top + plotH - (Number(count) / yMax) * plotH;
                    if (!started) {
                        detectionChartCtx.moveTo(x, y);
                        started = true;
                    } else {
                        detectionChartCtx.lineTo(x, y);
                    }
                }
                detectionChartCtx.stroke();
            }
        }

        async function pollDetections() {
            const minutes = clampChartMinutes();
            try {
                const res = await fetch(`/api/detections?minutes=${minutes}`);
                const data = await res.json();
                drawDetectionChart(data.series || [], data.window_sec || minutes * 60);
            } catch (err) {
                console.error('Detection poll failed:', err);
            }
        }

        function scheduleDetectionPoll() {
            if (chartMinutesDebounce) clearTimeout(chartMinutesDebounce);
            chartMinutesDebounce = setTimeout(() => {
                chartMinutesDebounce = null;
                if (isRunning) pollDetections();
            }, 200);
        }

        chartMinutesInput.addEventListener('change', scheduleDetectionPoll);
        chartMinutesInput.addEventListener('input', scheduleDetectionPoll);

        requestAnimationFrame(() => drawDetectionChart([], CHART_MINUTES_DEFAULT * 60));
        window.addEventListener('resize', () => drawDetectionChart(lastChartSeries, lastChartWindowSec));

        const WB_GAIN_MIN = 0.5;
        const WB_GAIN_MAX = 2.5;
        const WB_GAIN_SPAN = WB_GAIN_MAX - WB_GAIN_MIN;

        let wbGains = { r: 1.7, b: 1.55 };
        let wbGradientCanvas = null;
        let wbSendTimer = null;
        let wbEnabled = false;
        let wbAwb = true;

        function wbPreviewRgb(rGain, bGain, ref = 128) {
            return [
                Math.min(255, ref * rGain),
                Math.min(255, ref),
                Math.min(255, ref * bGain),
            ];
        }

        function buildWbGradient() {
            const w = wbPicker.width;
            const h = wbPicker.height;
            wbGradientCanvas = document.createElement('canvas');
            wbGradientCanvas.width = w;
            wbGradientCanvas.height = h;
            const gctx = wbGradientCanvas.getContext('2d');
            const img = gctx.createImageData(w, h);
            const d = img.data;
            for (let py = 0; py < h; py++) {
                const rGain = WB_GAIN_MIN + (1 - py / (h - 1)) * WB_GAIN_SPAN;
                for (let px = 0; px < w; px++) {
                    const bGain = WB_GAIN_MIN + (px / (w - 1)) * WB_GAIN_SPAN;
                    const [r, g, b] = wbPreviewRgb(rGain, bGain);
                    const i = (py * w + px) * 4;
                    d[i] = r;
                    d[i + 1] = g;
                    d[i + 2] = b;
                    d[i + 3] = 255;
                }
            }
            gctx.putImageData(img, 0, 0);
        }

        function gainToPickerPos(rGain, bGain) {
            const w = wbPicker.width;
            const h = wbPicker.height;
            return {
                x: ((bGain - WB_GAIN_MIN) / WB_GAIN_SPAN) * (w - 1),
                y: (1 - (rGain - WB_GAIN_MIN) / WB_GAIN_SPAN) * (h - 1),
            };
        }

        function pickerPosToGain(x, y) {
            const w = wbPicker.width;
            const h = wbPicker.height;
            const bGain = Math.max(
                WB_GAIN_MIN,
                Math.min(WB_GAIN_MAX, WB_GAIN_MIN + (x / (w - 1)) * WB_GAIN_SPAN),
            );
            const rGain = Math.max(
                WB_GAIN_MIN,
                Math.min(WB_GAIN_MAX, WB_GAIN_MIN + (1 - y / (h - 1)) * WB_GAIN_SPAN),
            );
            return { r: rGain, b: bGain };
        }

        function drawWbPicker() {
            if (!wbGradientCanvas) buildWbGradient();
            wbPickerCtx.drawImage(wbGradientCanvas, 0, 0);
            const { x, y } = gainToPickerPos(wbGains.r, wbGains.b);
            wbPickerCtx.strokeStyle = '#fff';
            wbPickerCtx.lineWidth = 2;
            wbPickerCtx.beginPath();
            wbPickerCtx.arc(x, y, 7, 0, Math.PI * 2);
            wbPickerCtx.stroke();
            wbPickerCtx.strokeStyle = '#000';
            wbPickerCtx.lineWidth = 1;
            wbPickerCtx.beginPath();
            wbPickerCtx.arc(x, y, 7, 0, Math.PI * 2);
            wbPickerCtx.stroke();
            wbRTxt.textContent = wbGains.r.toFixed(2);
            wbBTxt.textContent = wbGains.b.toFixed(2);
        }

        function scheduleWbSend() {
            if (!wbEnabled) return;
            if (wbSendTimer) clearTimeout(wbSendTimer);
            wbSendTimer = setTimeout(async () => {
                wbSendTimer = null;
                try {
                    await fetch('/api/wb', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            r: wbGains.r,
                            b: wbGains.b,
                            awb: wbAwb,
                        }),
                    });
                } catch (err) {
                    console.error('WB update failed:', err);
                }
            }, 50);
        }

        async function postWbAwb(awb) {
            if (!wbEnabled) return;
            try {
                const body = { awb };
                if (!awb) {
                    body.r = wbGains.r;
                    body.b = wbGains.b;
                }
                await fetch('/api/wb', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            } catch (err) {
                console.error('WB AWB toggle failed:', err);
            }
        }

        function setWbAwb(awb, send = true) {
            wbAwb = awb;
            wbAwbCheckbox.checked = awb;
            if (send) postWbAwb(awb);
        }

        function setWbGains(r, b, send = true) {
            wbGains.r = r;
            wbGains.b = b;
            drawWbPicker();
            if (send) scheduleWbSend();
        }

        function updateWbPanelState(enabled) {
            wbEnabled = enabled;
            wbPanel.classList.toggle('disabled', !enabled);
        }

        function handleWbPointer(clientX, clientY) {
            if (!wbEnabled) return;
            if (wbAwb) setWbAwb(false);
            const rect = wbPicker.getBoundingClientRect();
            const scaleX = wbPicker.width / rect.width;
            const scaleY = wbPicker.height / rect.height;
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            const { r, b } = pickerPosToGain(x, y);
            setWbGains(r, b);
        }

        wbAwbCheckbox.addEventListener('change', () => {
            setWbAwb(wbAwbCheckbox.checked);
        });

        let wbDragging = false;
        wbPicker.addEventListener('pointerdown', (e) => {
            if (!wbEnabled) return;
            wbDragging = true;
            wbPicker.setPointerCapture(e.pointerId);
            handleWbPointer(e.clientX, e.clientY);
        });
        wbPicker.addEventListener('pointermove', (e) => {
            if (wbDragging) handleWbPointer(e.clientX, e.clientY);
        });
        wbPicker.addEventListener('pointerup', () => { wbDragging = false; });
        wbPicker.addEventListener('pointercancel', () => { wbDragging = false; });

        buildWbGradient();
        drawWbPicker();

        let isRunning = false;
        let statsTimer = null;
        let pendingPorts = [];

        function setError(message) {
            perfTxt.classList.add('status-error');
            perfTxt.innerText = message;
        }

        function clearError() {
            perfTxt.classList.remove('status-error');
        }

        async function pollStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                fpsTxt.innerText = data.fps ?? 0;
                if (data.error) {
                    setError(data.status_text || `Error: ${data.error}`);
                } else {
                    clearError();
                    perfTxt.innerText = data.status_text || 'Status: Disconnected';
                }
                updateWbPanelState(isRunning && !!data.is_raw);
                if (data.wb_awb != null && data.wb_awb !== wbAwb) {
                    setWbAwb(data.wb_awb, false);
                }
                if (wbEnabled && data.wb_r != null && data.wb_b != null && !wbDragging) {
                    const r = data.wb_r;
                    const b = data.wb_b;
                    if (Math.abs(r - wbGains.r) > 0.001 || Math.abs(b - wbGains.b) > 0.001) {
                        setWbGains(r, b, false);
                    }
                }
            } catch (err) {
                setError('Error: ' + err.message);
            }
        }

        function showPortModal(ports) {
            pendingPorts = ports;
            portSelect.innerHTML = '';
            for (const p of ports) {
                const opt = document.createElement('option');
                opt.value = p.device;
                opt.textContent = `${p.device} — ${p.description}`;
                portSelect.appendChild(opt);
            }
            portModal.classList.add('open');
        }

        function hidePortModal() {
            portModal.classList.remove('open');
        }

        async function choosePort() {
            const res = await fetch('/api/ports');
            const ports = await res.json();
            if (!ports.length) {
                setError('Error: No serial ports found.');
                return null;
            }
            if (ports.length === 1) {
                return ports[0].device;
            }
            return new Promise((resolve) => {
                showPortModal(ports);
                const onConfirm = () => {
                    cleanup();
                    resolve(portSelect.value);
                };
                const onCancel = () => {
                    cleanup();
                    resolve(null);
                };
                const cleanup = () => {
                    hidePortModal();
                    confirmPortBtn.removeEventListener('click', onConfirm);
                    cancelPortBtn.removeEventListener('click', onCancel);
                };
                confirmPortBtn.addEventListener('click', onConfirm);
                cancelPortBtn.addEventListener('click', onCancel);
            });
        }

        async function startStream() {
            try {
                const port = await choosePort();
                if (!port) return;

                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port }),
                });
                const data = await res.json();
                if (!res.ok) {
                    setError('Error: ' + (data.error || res.statusText));
                    return;
                }

                isRunning = true;
                toggleBtn.innerText = 'STOP STREAM';
                toggleBtn.className = 'btn-stop';
                clearError();
                perfTxt.innerText = 'Status: Connected';
                streamImg.src = '/video_feed?' + Date.now();
                statsTimer = setInterval(() => {
                    pollStats();
                    pollDetections();
                }, 1000);
                pollStats();
                pollDetections();
            } catch (err) {
                setError('Error: ' + err.message);
            }
        }

        async function stopStream() {
            try {
                await fetch('/api/stop', { method: 'POST' });
            } catch (err) {
                console.error(err);
            }
            isRunning = false;
            toggleBtn.innerText = 'START STREAM';
            toggleBtn.className = 'btn-start';
            streamImg.removeAttribute('src');
            if (statsTimer) {
                clearInterval(statsTimer);
                statsTimer = null;
            }
            fpsTxt.innerText = '0';
            updateWbPanelState(false);
            clearError();
            perfTxt.innerText = 'Status: Disconnected';
            drawDetectionChart([], clampChartMinutes() * 60);
        }

        toggleBtn.addEventListener('click', async () => {
            if (isRunning) {
                await stopStream();
            } else {
                await startStream();
            }
        });
    </script>
</body>
</html>
